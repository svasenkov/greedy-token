# Prod preset — Ollama 7b + 14b + optional 32b (heavy off by default)
# greedy-token config --init --preset prod-ollama-3
# Enable ollama-heavy on server when VRAM allows: enabled: true + ollama pull 32b
# Unified model list (ADR-0001): tier is derived from billing/cost, not stored.

llm:
  policy: cheap_only
  models:
    - id: fast
      enabled: true
      provider: ollama
      url: http://127.0.0.1:11434
      model: qwen2.5-coder:7b-instruct-q4_K_M
      locality: local
      billing: free
      profiles: [tms-classify, tms-auth-probe, classify, compress]
    - id: smart
      enabled: true
      provider: ollama
      url: http://127.0.0.1:11434
      model: qwen2.5-coder:14b-instruct-q4_K_M
      locality: local
      billing: free
      profiles: [tms-generate, generate, audit]
    - id: ollama-heavy
      enabled: false
      provider: ollama
      url: http://127.0.0.1:11434
      model: qwen2.5-coder:32b-instruct-q4_K_M
      locality: local
      billing: free
      profiles: [architecture, complex-refactor, pipeline-fallback, crystallize-verify]
    - id: yandex-lite
      enabled: false
      provider: yandex_gpt
      model: yandexgpt-lite
      locality: remote
      billing: metered
      cost_per_1m_usd: 7
      api_key_env: YANDEX_GPT_API_KEY
      profiles: [tms-generate-fallback, escalate]
  cheap:
    default_id: fast
    selection: auto
  expensive:
    opt_in: false
    daily_cap_usd: 5
  escalation:
    enabled: true
    chain: [fast, smart, ollama-heavy, yandex-lite]
    max_steps: 3
