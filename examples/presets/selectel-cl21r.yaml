# CL21R Selectel — Ollama 7b (classify) + 14b (generate)
# Alias of examples/selectel/greedy-token.yaml
# greedy-token config --init --preset selectel-cl21r

llm:
  policy: cheap_only
  cheap:
    default_id: fast
    selection: auto
    models:
      - id: fast
        turned_on: true
        provider: ollama
        url: http://127.0.0.1:11434
        model: qwen2.5:7b
        profiles: [tms-classify, tms-auth-probe, classify]
      - id: smart
        turned_on: true
        provider: ollama
        url: http://127.0.0.1:11434
        model: qwen2.5:14b
        profiles: [tms-generate, generate, audit]
  expensive:
    opt_in: false
    daily_cap_usd: 5
    models:
      - id: yandex-lite
        turned_on: false
        provider: yandex_gpt
        model: yandexgpt-lite
        profiles: [tms-generate-fallback, escalate, crystallize-verify]
        cost_per_1m_usd: 7
        api_key_env: YANDEX_GPT_API_KEY
  escalation:
    enabled: true
    chain: [fast, smart, yandex-lite]
    max_steps: 2
