# Runnable copy of .github/_ethalon/test.yml — edit ethalon first, then ./scripts/sync-github-workflows.sh.
name: Test

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  ALLURE_VERSION: "3.13.0"
  ALLURE_ENDPOINT: ${{ vars.ALLURE_ENDPOINT || 'https://allure.autotests.cloud' }}
  # TestOps: https://allure.autotests.cloud/project/5276
  ALLURE_PROJECT_ID: ${{ vars.ALLURE_PROJECT_ID || '5276' }}

jobs:
  test:
    name: tests (all)
    runs-on: ubuntu-latest
    env:
      ALLURE_RESULTS: build/allure-results
      REPORT_ID: ${{ github.run_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Load existing GitHub Pages site
        if: github.ref == 'refs/heads/main'
        uses: actions/checkout@v7
        continue-on-error: true
        with:
          ref: gh-pages
          path: pages

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Restore Allure history
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -f pages/history.jsonl ]; then
            cp pages/history.jsonl history.jsonl
          fi

      - name: Install
        run: python -m pip install -e ".[dev,mcp]"

      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Verify GHA ethalon sync
        run: bash ./scripts/check-github-workflows-sync.sh

      - name: Pytest with coverage
        run: |
          set +e
          python -m coverage run -m pytest tests/ -v --alluredir="${ALLURE_RESULTS}"
          echo "TEST_EXIT=$?" >> "$GITHUB_ENV"
          set -e

      - name: Coverage report
        if: always() && env.TEST_EXIT == '0'
        run: |
          set +e
          python -m coverage report --include='src/greedy_token/*'
          echo "COVERAGE_EXIT=$?" >> "$GITHUB_ENV"
          set -e

      - name: Allure environment
        if: always() && hashFiles('build/allure-results/**') != ''
        run: |
          cat >> "${ALLURE_RESULTS}/environment.properties" <<EOF
          Framework=pytest
          Python=3.12
          Repository=${{ github.repository }}
          Run=${{ github.run_number }}
          EOF

      - name: Install allurectl
        if: vars.ALLURE_PROJECT_ID != ''
        continue-on-error: true
        id: setup-allurectl
        uses: allure-framework/setup-allurectl@v1
        with:
          allure-endpoint: ${{ env.ALLURE_ENDPOINT }}
          allure-token: ${{ secrets.ALLURE_TOKEN }}
          allure-project-id: ${{ env.ALLURE_PROJECT_ID }}

      - name: Allure 3 quality gate
        if: always() && hashFiles('build/allure-results/**') != ''
        run: |
          set +e
          npx --yes "allure@${ALLURE_VERSION}" quality-gate "${ALLURE_RESULTS}" --config allurerc.mjs
          echo "QUALITY_GATE_EXIT=$?" >> "$GITHUB_ENV"
          set -e

      - name: Upload results to Allure TestOps
        if: always() && steps.setup-allurectl.outcome == 'success' && hashFiles('build/allure-results/**') != ''
        continue-on-error: true
        id: testops-upload
        env:
          ALLURE_PROJECT_ID: ${{ env.ALLURE_PROJECT_ID }}
        run: |
          set +e
          export ALLURE_LAUNCH_NAME="greedy-token — ${GITHUB_REPOSITORY} #${GITHUB_RUN_NUMBER}"
          allurectl upload "${ALLURE_RESULTS}" 2>&1 | tee allurectl-upload.log
          UPLOAD_EXIT=${PIPESTATUS[0]}
          echo "TESTOPS_UPLOAD_EXIT=${UPLOAD_EXIT}" >> "$GITHUB_ENV"
          if [ "$UPLOAD_EXIT" -eq 0 ]; then
            LAUNCH_URL=$(grep -Eo 'https://[^ ]+/launch/[0-9]+' allurectl-upload.log | head -1 || true)
            if [ -n "$LAUNCH_URL" ]; then
              echo "TESTOPS_LAUNCH_URL=${LAUNCH_URL}" >> "$GITHUB_ENV"
            fi
          fi
          set -e

      - name: Generate Allure 3 report
        if: always() && hashFiles('build/allure-results/**') != ''
        id: allure-report
        continue-on-error: true
        run: |
          cat > "${ALLURE_RESULTS}/executor.json" <<EOF
          {
            "reportName": "Run #${{ github.run_number }}",
            "buildOrder": ${{ github.run_number }},
            "reportUrl": "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/awesome/index.html",
            "buildUrl": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          EOF
          npx --yes "allure@${ALLURE_VERSION}" generate "${ALLURE_RESULTS}" \
            --config allurerc.mjs \
            --output build/allure-report

      - name: Prepare GitHub Pages
        if: >-
          always() &&
          github.ref == 'refs/heads/main' &&
          steps.allure-report.outcome == 'success' &&
          hashFiles('build/allure-report/awesome/index.html') != ''
        run: |
          mkdir -p pages/reports/${REPORT_ID}
          cp -r build/allure-report/. "pages/reports/${REPORT_ID}/"
          if [ -f history.jsonl ]; then
            cp history.jsonl pages/history.jsonl
          elif [ -f build/allure-report/history.jsonl ]; then
            cp build/allure-report/history.jsonl pages/history.jsonl
          fi
          echo "${REPORT_ID}" > pages/latest-run-id.txt
          touch pages/.nojekyll

      - name: Upload GitHub Pages artifact
        if: always() && github.ref == 'refs/heads/main' && hashFiles('pages/reports/**/index.html') != ''
        uses: actions/upload-pages-artifact@v5
        with:
          path: pages

      - name: Sync gh-pages branch backup
        if: always() && github.ref == 'refs/heads/main' && hashFiles('pages/reports/**/index.html') != ''
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: pages
          enable_jekyll: false

      - name: Job summary
        if: always()
        run: |
          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/awesome/index.html"
          DASHBOARD_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/reports/${REPORT_ID}/dashboard/index.html"
          echo "## greedy-token Tests" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- [GitHub Actions run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          if [ -f build/allure-report/awesome/index.html ]; then
            echo "- [Allure 3 report](${REPORT_URL})" >> "$GITHUB_STEP_SUMMARY"
            echo "- [Allure 3 dashboard](${DASHBOARD_URL})" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Allure 3 report: _not generated (no results or generation error)_" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ -n "${TESTOPS_LAUNCH_URL:-}" ]; then
            echo "- [Allure TestOps launch](${TESTOPS_LAUNCH_URL})" >> "$GITHUB_STEP_SUMMARY"
          elif [ "${TESTOPS_UPLOAD_EXIT:-}" != "" ] && [ "${TESTOPS_UPLOAD_EXIT}" != "0" ]; then
            echo "- Allure TestOps upload: _failed (check ALLURE_TOKEN secret)_" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- TestOps project: [5276](https://allure.autotests.cloud/project/5276)" >> "$GITHUB_STEP_SUMMARY"
          if [ "${QUALITY_GATE_EXIT:-}" = "0" ]; then
            echo "- Allure 3 quality gate: passed (\`maxFailures: 0\`, \`minTestsCount: 325\`)" >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "${QUALITY_GATE_EXIT:-}" ]; then
            echo "- Allure 3 quality gate: **failed** (exit ${QUALITY_GATE_EXIT})" >> "$GITHUB_STEP_SUMMARY"
          fi
          if [ "${COVERAGE_EXIT:-}" = "0" ]; then
            echo "- Line coverage: **100%** (\`src/greedy_token/\`, lines + branches, \`fail_under=100\`)" >> "$GITHUB_STEP_SUMMARY"
          elif [ -n "${COVERAGE_EXIT:-}" ]; then
            echo "- Line coverage: **failed** (exit ${COVERAGE_EXIT})" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Fail if tests, coverage, or quality gate failed
        if: >-
          always() &&
          ((env.TEST_EXIT != '' && env.TEST_EXIT != '0') ||
           (env.COVERAGE_EXIT != '' && env.COVERAGE_EXIT != '0') ||
           (env.QUALITY_GATE_EXIT != '' && env.QUALITY_GATE_EXIT != '0'))
        run: |
          if [ -n "${TEST_EXIT:-}" ] && [ "${TEST_EXIT}" != "0" ]; then
            exit "${TEST_EXIT}"
          fi
          if [ -n "${COVERAGE_EXIT:-}" ] && [ "${COVERAGE_EXIT}" != "0" ]; then
            exit "${COVERAGE_EXIT}"
          fi
          if [ -n "${QUALITY_GATE_EXIT:-}" ] && [ "${QUALITY_GATE_EXIT}" != "0" ]; then
            exit "${QUALITY_GATE_EXIT}"
          fi

  deploy-pages:
    name: deploy Allure to GitHub Pages
    needs: test
    if: >-
      needs.test.result == 'success' &&
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  tests:
    name: tests (${{ matrix.layer }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        layer: [unit, component, integration, e2e]
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install
        run: python -m pip install -e ".[dev,mcp]"

      - name: Install ripgrep
        if: matrix.layer == 'component' || matrix.layer == 'integration' || matrix.layer == 'e2e'
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Pytest slice
        run: python -m pytest tests/ -q -m "${{ matrix.layer }}"
