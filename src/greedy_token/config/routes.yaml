# Task routing — generic defaults, portable across workspaces.
#
# Tier order (tool-first): tool → python → ollama → rag → cursor
# First matching tier wins (best score within tier).
#
# Workspace-specific routes live in $GREEDY_TOKEN_ROOT/.greedy-token.yaml
# (inline `routes:` or a `routes_file:` pointer) and are merged over these
# defaults: same id replaces the bundled route, new ids win tier tie-breaks.
# Example overlay: examples/routes/workspace-routes.yaml.
# Bootstrap: greedy-token init --routes-from FILE | --routes-scaffold.

routes:
  - id: tool-rg-search
    target: tool
    tool: rg
    read_only: true
    patterns:
      - find
      - search for
      - grep
      - where is
      - locate
      - look for
      - найди
      - найти
      - где лежит
      - где находится
      - где файл
      - покажи где
    note: "0 tokens — ripgrep before RAG/Cursor"
    globs:
      - "!.git/**"
      - "!node_modules/**"
      - "!build/**"
      - "!.venv/**"
      - "!.cursor/hooks/**"
    search_paths:
      - "."

  - id: rag-lookup
    target: rag
    patterns:
      - what is
      - how does
      - what does
      - difference between
      - что такое
      - объясни
      - расскажи
      - как работает
      - для чего
      - что значит
      - в чём разница
    domains: []
    note: "Docs/RAG lookup before full agent context"

  - id: cursor-wiring
    target: cursor
    patterns:
      - implement
      - refactor
      - fix bug
      - add component
      - header layout
      - spring backend
      - wiring
      - architecture
      - new feature
      - ui test class
    note: "One chat = one zone; use skill if listed"

cursor_fallback:
  message: |
    No exact route match — most likely a full agent (Cursor) task.
    Keep the chat scoped: one chat = one zone.
    Before the chat: greedy-token audit-context && greedy-token rag "<topic>".
