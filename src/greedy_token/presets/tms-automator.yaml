# TMS automator — CL21R profiles + escalation (prod)
# greedy-token config --init --preset tms-automator
# Unified model list (ADR-0001): tier is derived from billing/cost, not stored.

llm:
  policy: auto
  models:
    - id: fast
      enabled: true
      provider: ollama
      url: http://127.0.0.1:11434
      model: qwen2.5:7b
      locality: local
      billing: free
      profiles: [tms-classify, tms-auth-probe, classify]
    - id: smart
      enabled: true
      provider: ollama
      url: http://127.0.0.1:11434
      model: qwen2.5:14b
      locality: local
      billing: free
      profiles: [tms-generate, generate, audit]
    - id: yandex-lite
      enabled: false
      provider: yandex_gpt
      model: yandexgpt-lite
      locality: remote
      billing: metered
      cost_per_1m_usd: 7
      api_key_env: YANDEX_GPT_API_KEY
      profiles: [tms-generate-fallback, escalate, crystallize-verify]
  cheap:
    default_id: fast
    selection: auto
  expensive:
    opt_in: false
    daily_cap_usd: 5
  escalation:
    enabled: true
    chain: [fast, smart, yandex-lite]
    max_steps: 2
